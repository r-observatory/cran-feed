name: Seed Version History

on:
  workflow_dispatch:
    inputs:
      limit:
        description: 'Packages per run (0 = all)'
        default: '0'
        type: string

permissions:
  contents: write

concurrency:
  group: cran-feed-update
  cancel-in-progress: false

jobs:
  seed:
    runs-on: ubuntu-latest
    timeout-minutes: 480
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: release

      - name: Install RSQLite
        run: Rscript -e 'install.packages("RSQLite", repos = "https://cloud.r-project.org")'

      - name: Download previous database
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release download --pattern "feed.db" || true

      - name: Fetch version history from CRAN archive
        run: |
          LIMIT="${{ inputs.limit }}"
          if [ "$LIMIT" = "0" ]; then
            Rscript scripts/fetch-version-history.R feed.db --limit=99999
          else
            Rscript scripts/fetch-version-history.R feed.db --limit="$LIMIT"
          fi

      - name: Convert version history into package_versions events
        run: |
          # Copy feed.db as the seed source, then merge back
          cp feed.db feed-seed.db
          Rscript scripts/seed-versions.R feed.db feed-seed.db
          rm -f feed-seed.db

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v$(date -u +'%Y%m%d-%H%M%S')"
          PV_COUNT=$(sqlite3 feed.db "SELECT COUNT(*) FROM package_versions")
          PVH_COUNT=$(sqlite3 feed.db "SELECT COUNT(*) FROM package_version_history")
          PKG_COUNT=$(sqlite3 feed.db "SELECT COUNT(*) FROM packages")
          DB_SIZE=$(du -h feed.db | cut -f1)
          gh release create "$TAG" feed.db \
            --title "Version History Seed $TAG" \
            --notes-file release_notes.md \
            --latest
